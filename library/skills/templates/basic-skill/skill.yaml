id: basic-skill-template
name: Basic Skill Template
description: A template for creating new basic skills

version: 1.0.0

# The agent that will implement this skill
agent: repo-analyzer

# The provider to use for execution
provider: anthropic/claude-opus

# Input schema - what the skill accepts
input:
  type: object
  required:
    - input_field
  properties:
    input_field:
      type: string
      description: Description of the input field

# Output schema - what the skill produces
output:
  type: object
  properties:
    result:
      type: string
      description: The result of processing
    metadata:
      type: object
      description: Additional metadata

# Reference to the prompt template
prompt: ./prompt.md

# Examples for testing and documentation
examples:
  - input: ./examples/example1.input.json
    output: ./examples/example1.output.json
